# Prometheus monitoring configuration for CloudBridge
# Captures: API metrics, IoT service metrics, node-level resource usage
# Atos alignment: lifecycle governance and performance tracking

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: 'cloudbridge'
    division: 'tech-foundations'
    atos_plan: 'genesis-2025'

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: 'cloudbridge-api'
    static_configs:
      - targets: ['localhost:4000']
    metrics_path: /metrics

  - job_name: 'cloudbridge-iot'
    static_configs:
      - targets: ['localhost:5000']
    metrics_path: /metrics

  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - 'hci-node-1:9100'
          - 'hci-node-2:9100'
          - 'hci-node-3:9100'
          - 'azure-node-1:9100'

  - job_name: 'carbon-iot-sensors'
    static_configs:
      - targets: ['iot-service:5000']
    metrics_path: /metrics
    scrape_interval: 30s
